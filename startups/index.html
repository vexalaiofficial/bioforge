<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vexal Startup Portfolio</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .nav {
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      margin-right: auto;
    }
    .nav a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav a:hover, .nav a.active {
      color: #fff;
      background: #2a2a2a;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    // Shared styles
    const container = {
      maxWidth: '800px',
      margin: '0 auto',
      padding: '80px 24px'
    };

    // ChurnGuard Component
    const ChurnGuard = () => (
      <div style={container}>
        <div style={{
          display: 'inline-block',
          background: 'rgba(255,61,61,0.2)',
          color: '#ff3d3d',
          padding: '6px 14px',
          borderRadius: '20px',
          fontSize: '12px',
          fontWeight: 600,
          marginBottom: '24px'
        }}>NOW IN BETA</div>
        
        <h1 style={{ fontSize: 'clamp(36px, 8vw, 64px)', fontWeight: 700, lineHeight: 1.1, marginBottom: '20px', letterSpacing: '-2px' }}>
          Stop Losing<br /><span style={{ color: '#ff3d3d' }}>Customers</span>
        </h1>
        
        <p style={{ fontSize: '20px', color: '#888', maxWidth: '540px', marginBottom: '48px' }}>
          ChurnGuard predicts which users are about to leave — before they cancel. Get automated retention campaigns that actually work.
        </p>

        <div style={{ background: '#141414', border: '1px solid #2a2a2a', borderRadius: '12px', padding: '24px', marginBottom: '16px' }}>
          <div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', color: '#ff3d3d', marginBottom: '8px' }}>THE PAIN</div>
          <p style={{ fontStyle: 'italic', color: '#888' }}>"We're at $15K MRR but churn is 8%. Every time we add 5 customers, we lose 3."</p>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px', marginTop: '48px' }}>
          <div style={{ background: '#141414', border: '1px solid #2a2a2a', borderRadius: '12px', padding: '20px' }}>
            <h3 style={{ fontSize: '16px', marginBottom: '8px' }}>🔮 Predictive Scoring</h3>
            <p style={{ fontSize: '14px', color: '#888' }}>AI analyzes usage patterns to flag at-risk accounts.</p>
          </div>
          <div style={{ background: '#141414', border: '1px solid #2a2a2a', borderRadius: '12px', padding: '20px' }}>
            <h3 style={{ fontSize: '16px', marginBottom: '8px' }}>⚡ Auto-Intervention</h3>
            <p style={{ fontSize: '14px', color: '#888' }}>Trigger personalized offers when risk spikes.</p>
          </div>
          <div style={{ background: '#141414', border: '1px solid #2a2a2a', borderRadius: '12px', padding: '20px' }}>
            <h3 style={{ fontSize: '16px', marginBottom: '8px' }}>📊 Churn Analytics</h3>
            <p style={{ fontSize: '14px', color: '#888' }}>Know exactly why users leave.</p>
          </div>
        </div>

        <div style={{ fontSize: '48px', fontWeight: 700, marginTop: '48px' }}>$29<span style={{ fontSize: '16px', color: '#888' }}>/month</span></div>

        <form style={{ marginTop: '32px', display: 'flex', gap: '12px', maxWidth: '400px' }} onSubmit={e => e.preventDefault()}>
          <input type="email" placeholder="Enter your email" required style={{
            flex: 1, background: '#141414', border: '1px solid #2a2a2a', padding: '14px 16px', borderRadius: '8px', color: '#e5e5e5', fontSize: '16px'
          }} />
          <button type="submit" style={{
            background: '#ff3d3d', color: '#fff', border: 'none', padding: '14px 24px', borderRadius: '8px', fontWeight: 600, cursor: 'pointer'
          }}>Get Early Access</button>
        </form>
      </div>
    );

    // OutreachIQ Component
    const OutreachIQ = () => (
      <div style={{ background: '#fafafa', color: '#111', minHeight: '100vh' }}>
        <div style={{ maxWidth: '900px', margin: '0 auto', padding: '60px 24px' }}>
          <div style={{ fontWeight: 800, fontSize: '20px', letterSpacing: '-0.5px' }}>Outreach<span style={{ color: '#0066cc' }}>IQ</span></div>
          
          <h1 style={{ fontSize: 'clamp(32px, 7vw, 56px)', fontWeight: 800, lineHeight: 1.15, margin: '24px 0', letterSpacing: '-1.5px' }}>
            Cold emails that<br />get replies
          </h1>
          <p style={{ fontSize: '18px', color: '#666', maxWidth: '520px', marginBottom: '40px' }}>
            We scan what your prospects are actually talking about online — then write emails that feel personal, not robotic.
          </p>
          
          <div style={{ display: 'flex', gap: '48px', marginBottom: '48px' }}>
            <div>
              <div style={{ fontSize: '48px', fontWeight: 800, color: '#0066cc', lineHeight: 1 }}>47%</div>
              <div style={{ fontSize: '13px', color: '#666', marginTop: '8px' }}>Avg. reply rate (vs 2%)</div>
            </div>
            <div>
              <div style={{ fontSize: '48px', fontWeight: 800, color: '#0066cc', lineHeight: 1 }}>10x</div>
              <div style={{ fontSize: '13px', color: '#666', marginTop: '8px' }}>More meetings booked</div>
            </div>
          </div>
          
          <div style={{ background: '#fff', borderLeft: '4px solid #0066cc', padding: '24px 28px', margin: '32px 0', fontStyle: 'italic', color: '#666', fontSize: '15px', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
            "We're sending 500 emails/week with 'personalization' but reply rate is under 2%."
            <div style={{ fontStyle: 'normal', fontWeight: 600, color: '#111', marginTop: '12px', fontSize: '13px' }}>— r/startups</div>
          </div>
          
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px', margin: '40px 0' }}>
            <div style={{ background: '#fffafa', border: '1px solid #ffcccc', borderRadius: '12px', padding: '28px' }}>
              <div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '12px', fontWeight: 600, color: '#cc0000' }}>❌ Generic</div>
              <p style={{ fontSize: '14px', color: '#666' }}>Hi {`{first_name}`}, I noticed {`{company}`} is growing fast...</p>
            </div>
            <div style={{ background: '#f0f7ff', border: '1px solid #cce5ff', borderRadius: '12px', padding: '28px' }}>
              <div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '12px', fontWeight: 600, color: '#0066cc' }}>✅ With OutreachIQ</div>
              <p style={{ fontSize: '14px', color: '#666' }}>Hey Sarah — saw your post about churn on r/SaaS...</p>
            </div>
          </div>
          
          <div style={{ background: '#fff', border: '2px solid #0066cc', borderRadius: '16px', padding: '40px', textAlign: 'center', marginTop: '48px', boxShadow: '0 4px 16px rgba(0,102,204,0.1)' }}>
            <div style={{ fontSize: '56px', fontWeight: 800, letterSpacing: '-2px' }}>$49<span style={{ fontSize: '18px', color: '#666', fontWeight: 400 }}>/month</span></div>
            <p style={{ color: '#666', marginTop: '8px' }}>No credit card required to start</p>
            <div style={{ display: 'flex', gap: '12px', maxWidth: '400px', margin: '24px auto 0' }}>
              <input type="email" placeholder="Your email" required style={{ flex: 1, padding: '14px 16px', border: '1px solid #e5e5e5', borderRadius: '8px', fontSize: '15px' }} />
              <button style={{ background: '#0066cc', color: '#fff', border: 'none', padding: '14px 24px', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>Join Waitlist</button>
            </div>
          </div>
        </div>
      </div>
    );

    // ContentPulse Component
    const ContentPulse = () => (
      <div style={{ background: '#0d1117', color: '#e6edf3', minHeight: '100vh' }}>
        <div style={{ maxWidth: '800px', margin: '0 auto', padding: '60px 24px' }}>
          <h1 style={{ fontSize: 'clamp(32px, 7vw, 52px)', fontWeight: 700, lineHeight: 1.15, marginBottom: '20px', letterSpacing: '-1px' }}>
            Never run out of<br /><span style={{ color: '#7ee787' }}>content ideas</span>
          </h1>
          <p style={{ fontSize: '18px', color: '#8b949e', maxWidth: '500px', marginBottom: '40px' }}>
            ContentPulse monitors what your audience is actually asking — in real Reddit threads and forums.
          </p>
          
          <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: '12px', overflow: 'hidden', margin: '32px 0' }}>
            <div style={{ background: '#161b22', borderBottom: '1px solid #30363d', padding: '12px 16px', display: 'flex', gap: '8px' }}>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#ff5f57' }}></div>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#febc2e' }}></div>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#28c840' }}></div>
            </div>
            <div style={{ padding: '20px', fontFamily: "'SF Mono', Monaco, monospace", fontSize: '13px' }}>
              <div style={{ color: '#8b949e', marginBottom: '8px' }}>$ contentpulse scan --community r/SaaS</div>
              <div style={{ color: '#8b949e', marginBottom: '8px' }}>🔍 Scanning 847 discussions...</div>
              <div style={{ color: '#8b949e', marginBottom: '8px' }}><span style={{ color: '#d2a8ff' }}>→ Found 23 high-intent questions about churn</span></div>
              <div style={{ color: '#7ee787', marginBottom: '8px' }}>✓ Generating blog post outline...</div>
              <div style={{ background: 'rgba(126, 231, 135, 0.12)', border: '1px solid #7ee787', borderRadius: '8px', padding: '16px', marginTop: '16px' }}>
                <div style={{ fontWeight: 600, color: '#7ee787', marginBottom: '8px', fontSize: '13px', textTransform: 'uppercase' }}>Blog Post #1</div>
                <p><strong>"The Real Reason Your SaaS Churn is High"</strong></p>
                <p style={{ marginTop: 8, color: '#8b949e', fontSize: 14 }}>Based on 23 discussions. Est. traffic: 2,400/mo</p>
              </div>
            </div>
          </div>
          
          <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: '12px', padding: '24px', margin: '32px 0', fontStyle: 'italic', color: '#8b949e' }}>
            "We're posting 2-3 blogs/month but barely getting traffic."
            <div style={{ fontStyle: 'normal', fontWeight: 600, color: '#e6edf3', marginTop: '12px', fontSize: '13px' }}>— r/SaaS</div>
          </div>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '16px', margin: '40px 0' }}>
            <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#7ee787' }}>🎯 Real Questions</h3>
              <p style={{ fontSize: '14px', color: '#8b949e' }}>Monitor 50+ communities.</p>
            </div>
            <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#7ee787' }}>✍️ Auto-Outline</h3>
              <p style={{ fontSize: '14px', color: '#8b949e' }}>Generate SEO blog outlines.</p>
            </div>
            <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#7ee787' }}>📈 Traffic Prediction</h3>
              <p style={{ fontSize: '14px', color: '#8b949e' }}>See estimated monthly searches.</p>
            </div>
          </div>
          
          <div style={{ fontSize: '48px', fontWeight: 700, marginTop: '40px' }}>$39<span style={{ fontSize: '16px', color: '#8b949e' }}>/month</span></div>
          
          <div style={{ marginTop: '24px' }}>
            <button style={{ background: '#7ee787', color: '#0d1117', padding: '16px 32px', borderRadius: '8px', fontWeight: 600, fontSize: '16px', border: 'none', cursor: 'pointer' }}>Start Free Trial</button>
            <form style={{ marginTop: '24px', display: 'flex', gap: '12px', maxWidth: '400px' }} onSubmit={e => e.preventDefault()}>
              <input type="email" placeholder="Enter your email" required style={{ flex: 1, background: '#161b22', border: '1px solid #30363d', padding: '14px 16px', borderRadius: '8px', color: '#e6edf3', fontSize: '16px' }} />
              <button type="submit" style={{ background: '#7ee787', color: '#0d1117', border: 'none', padding: '14px 24px', borderRadius: '8px', fontWeight: 600, cursor: 'pointer' }}>Get Access</button>
            </form>
          </div>
        </div>
      </div>
    );

    // PriceSpy Component
    const PriceSpy = () => (
      <div style={{ background: '#fff', color: '#111', minHeight: '100vh' }}>
        <div style={{ maxWidth: '800px', margin: '0 auto', padding: '60px 24px' }}>
          <h1 style={{ fontSize: 'clamp(32px, 7vw, 52px)', fontWeight: 800, lineHeight: 1.1, marginBottom: '20px', letterSpacing: '-1.5px' }}>
            Know what competitors<br /><span style={{ color: '#f97316' }}>charge</span>
          </h1>
          <p style={{ fontSize: '18px', color: '#666', maxWidth: '500px', marginBottom: '40px' }}>
            PriceSpy monitors competitor pricing changes and customer complaints — so you always price with confidence.
          </p>
          
          <div style={{ background: '#f5f5f5', borderLeft: '4px solid #f97316', padding: '24px 28px', margin: '32px 0', borderRadius: '0 8px 8px 0' }}>
            <div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', color: '#f97316', fontWeight: 600, marginBottom: '8px' }}>⚡ LIVE ALERT — 2 hours ago</div>
            <div style={{ fontSize: '18px', fontWeight: 600, marginBottom: '8px' }}>Competitor raised prices by 40%</div>
            <div style={{ color: '#666', fontSize: '14px' }}>Competitor XYZ increased from $49 → $69/mo.</div>
            <div style={{ marginTop: '20px', display: 'grid', gap: '12px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#fff', padding: '12px 16px', borderRadius: 8, border: '1px solid #d9f7be' }}>
                <span>Churnify: $29 → $39</span>
                <span style={{ fontSize: '11px', fontWeight: 600, padding: '4px 8px', borderRadius: 4, background: '#52c41a', color: '#fff' }}>+34%</span>
              </div>
            </div>
          </div>
          
          <div style={{ background: '#f5f5f5', borderRadius: '12px', padding: '24px', margin: '32px 0', fontStyle: 'italic', color: '#666' }}>
            "We've changed our pricing 3 times in 6 months. We have no idea what the 'right' price is."
            <div style={{ fontStyle: 'normal', fontWeight: 600, color: '#111', marginTop: '12px', fontSize: '13px' }}>— r/startups</div>
          </div>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px', margin: '40px 0' }}>
            <div style={{ background: '#f5f5f5', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#f97316' }}>📡 Real-Time Alerts</h3>
              <p style={{ fontSize: '14px', color: '#666' }}>Get notified the minute prices change.</p>
            </div>
            <div style={{ background: '#f5f5f5', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#f97316' }}>💬 Complaint Radar</h3>
              <p style={{ fontSize: '14px', color: '#666' }}>See what users hate about pricing.</p>
            </div>
            <div style={{ background: '#f5f5f5', borderRadius: '12px', padding: '24px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '8px', color: '#f97316' }}>🎯 Optimal Pricing</h3>
              <p style={{ fontSize: '14px', color: '#666' }}>AI recommends the perfect price.</p>
            </div>
          </div>
          
          <div style={{ background: '#f5f5f5', borderRadius: '16px', padding: '40px', textAlign: 'center', marginTop: '48px' }}>
            <div style={{ fontSize: '48px', fontWeight: 800 }}>$19<span style={{ fontSize: '16px', color: '#666', fontWeight: 400 }}>/month</span></div>
            <p style={{ color: '#666', marginTop: '8px' }}>First 7 days free</p>
            <button style={{ display: 'inline-block', background: '#f97316', color: '#fff', padding: '16px 32px', borderRadius: 8, fontWeight: 600, fontSize: '16px', border: 'none', marginTop: '24px', cursor: 'pointer' }}>Start Monitoring</button>
            <form style={{ marginTop: '24px', display: 'flex', gap: '12px', maxWidth: '360px', margin: '24px auto 0' }} onSubmit={e => e.preventDefault()}>
              <input type="email" placeholder="Your work email" required style={{ flex: 1, padding: '14px 16px', border: '1px solid #e0e0e0', borderRadius: 8, fontSize: 15 }} />
              <button type="submit" style={{ background: '#f97316', color: '#fff', border: 'none', padding: '14px 24px', borderRadius: 8, fontWeight: 600, cursor: 'pointer' }}>Try Free</button>
            </form>
          </div>
        </div>
      </div>
    );

    // Main App
    const pages = [
      { id: 'churnguard', label: 'ChurnGuard' },
      { id: 'outreachiq', label: 'OutreachIQ' },
      { id: 'contentpulse', label: 'ContentPulse' },
      { id: 'pricespy', label: 'PriceSpy' },
    ];

    const PageComponents = {
      churnguard: <ChurnGuard />,
      outreachiq: <OutreachIQ />,
      contentpulse: <ContentPulse />,
      pricespy: <PriceSpy />
    };

    function App() {
      const [active, setActive] = useState('churnguard');

      return (
        <>
          <nav className="nav">
            <div className="nav-brand">⚡ Vexal</div>
            {pages.map(page => (
              <a
                key={page.id}
                href={`#${page.id}`}
                className={active === page.id ? 'active' : ''}
                onClick={(e) => { e.preventDefault(); setActive(page.id); }}
              >
                {page.label}
              </a>
            ))}
          </nav>
          <main style={{ paddingTop: 60 }}>
            {PageComponents[active]}
          </main>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
